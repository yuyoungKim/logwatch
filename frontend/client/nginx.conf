server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Proxy API calls (REST + SSE) to the Express server.
    # 'frontend-server' is the Docker Compose service name.
    location /api/ {
        proxy_pass         http://frontend-server:3001;
        proxy_http_version 1.1;

        # Required for SSE: disable buffering and keep connection open.
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA catch-all — let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
