services:
  postgres:
    image: postgres:15-alpine
    container_name: logwatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: logwatch_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ml:
    build:
      context: ../ml
      dockerfile: Dockerfile
    container_name: logwatch_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Use the Docker-internal hostname "postgres", not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:--0.1}
      WINDOW_SECONDS: ${WINDOW_SECONDS:-60}
      SLIDE_SECONDS: ${SLIDE_SECONDS:-10}
      WARMUP_WINDOWS: ${WARMUP_WINDOWS:-50}
      RETRAIN_INTERVAL_SECONDS: ${RETRAIN_INTERVAL_SECONDS:-1800}
      ML_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health', timeout=4); sys.exit(0 if r.status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-server:
    build:
      context: ../frontend/server
      dockerfile: Dockerfile
    container_name: logwatch_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend-client:
    build:
      context: ../frontend/client
      dockerfile: Dockerfile
    container_name: logwatch_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      frontend-server:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
